# Spoken summary hook + tts_daemon defaults (read by speak_summary_prepare.py and tts_daemon_ctl.py).
# Change settings via Cursor slash commands (/aftertone-lang, /aftertone-voice, …) — not by hand.
# Full reference (every key, languages, daemon commands): README.md in this folder.
#
# When edits take effect
# ----------------------
# • Every agent reply (no daemon restart): enabled, quiet_hours, min_chars, max_chars,
#   spoken_summary_max_chars, heuristic_max_chars, plain_excerpt_max_chars, heuristic_*,
#   only_speak_spoken_summary, speed, lang, total_step, mode —
#   speak_summary_prepare.py reads this file each time and sends speed/lang/totalStep on POST /say.
#   After changing `lang`, from repo root run: uv run --directory py python sync_spoken_rule_lang.py
#   (updates the auto-generated blurb in .cursor/rules/spoken-summary.mdc).
# • Only after daemon restart: port, onnx_dir, voice_style / voice_type, use_gpu — the
#   long‑running tts_daemon loads models and voice JSON once at start (tts_daemon_ctl.py).
# • Port file: while the daemon is running, the hook posts to the port in
#   .cursor/hooks/state/tts-daemon.port. Changing "port" here alone does nothing until you
#   restart so that file matches, e.g.:
#     cd py && uv run python tts_daemon_ctl.py restart --repo-root ..

enabled = true
port = 8765
onnx_dir = "../assets/onnx"
use_gpu = false
# interrupt = start new speech immediately (lower latency after each reply); queue = wait for prior line to finish
mode = "interrupt"

# --- Voice & speech ---
# Voice preset id (M1, F2, … — whatever JSON files you have under assets/voice_styles/).
# Used when voice_style is empty; otherwise voice_style wins.
voice_type = "F4"
# Path to the voice style JSON (relative to py/ or absolute). Set to "" to derive from voice_type only.
voice_style = ""
# Language of the spoken *words* and of the ONNX text processor (<lang>…</lang>);
# must be one of helper.AVAILABLE_LANGS (e.g. en, fr, ja). The hook does not translate:
# write <spoken_summary> in this language, or rely on heuristics only when the
# assistant reply is already in the same language. See only_speak_spoken_summary.
lang = "en"
# Playback speed: 1.0 is baseline; higher speaks faster (same meaning as CLI examples).
speed = 1.15
# ONNX denoising steps (quality vs CPU). Upstream examples often use 8; 4 is faster but rougher.
total_step = 4

# Empty = always speak. Set e.g. "22:00-08:00" for overnight quiet (local clock).
quiet_hours = ""
min_chars = 5
# Max characters sent to TTS for heuristic / plain-excerpt paths (and upper bound when
# spoken_summary_max_chars is 0). Use 0 for no limit on those paths (not recommended).
max_chars = 2000
# Hard cap for <spoken_summary>…</spoken_summary> body only (default 360). Stops TTS from
# reading an essay if the tag wraps most of the reply. Set to 0 to use max_chars for the tag.
spoken_summary_max_chars = 280
# Sentences inside <spoken_summary>: 0 = speak the full tag (only spoken_summary_max_chars). Set 1–2 to trim for shorter TTS.
spoken_summary_max_sentences = 0
# Max characters for sentence heuristics when there is no tag (default 480).
heuristic_max_chars = 480
# Last-resort plain excerpt cap (default 420).
plain_excerpt_max_chars = 420
# Fallback when there is no <spoken_summary>: how many sentences to join after
# skipping soft openers (1 = brief, 2 = what + often why).
heuristic_max_sentences = 2
# If this fraction of the reply sits inside fenced code blocks, treat as code-heavy
# and cap fallback sentences (listeners skim code on screen; keep TTS short).
heuristic_code_fence_fraction = 0.35
heuristic_max_sentences_code_heavy = 1

# v2 summary routing: auto | tag_only | heuristic
# tag_only = only <spoken_summary> is spoken (default)
summary_mode = "tag_only"

# Legacy alias: true forces tag_only when summary_mode is unset
only_speak_spoken_summary = true

# Supertonic 3 inline expression tags (state= on spoken_summary): off | subtle | expressive | passthrough
# Repo default off — agents use per-sentence !! ?? ?! !? in the tag (see spoken-summary rule). No daemon restart.
expression_mode = "off"
